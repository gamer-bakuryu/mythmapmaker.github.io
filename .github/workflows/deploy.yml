name: Deploy Vite (Optimized) to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # NODE SETUP (SAFE CACHE)
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # =========================
      # INSTALL (CI OPTIMIZED)
      # =========================
      - name: Install dependencies
        run: npm ci || npm install

      # =========================
      # BUILD (VITE OPTIMIZED)
      # =========================
      - name: Build project (Vite production)
        run: npm run build

      # =========================
      # VERIFY DIST
      # =========================
      - name: Verify build output
        run: ls -la dist

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
